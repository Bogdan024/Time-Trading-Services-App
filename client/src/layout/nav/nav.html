<header class="nav-shell sticky top-0 z-50 w-full" [class.nav-shell-scrolled]="isScrolled()">
  <div class="nav-frame mx-auto flex max-w-[1180px] flex-wrap items-center gap-4 px-6 py-3">
    <a routerLink="/" class="nav-brand flex items-center gap-3">
      <span class="nav-mark grid size-10 place-items-center rounded-xl">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 7v5l3.2 2"></path>
        </svg>
      </span>
      <span class="nav-wordmark">Time Trading</span>
    </a>

    @if (accountService.currentUser()) {
      <nav class="nav-links ml-2 hidden flex-wrap gap-1 md:flex">
        <a routerLink="/tasks" routerLinkActive="nav-link-active">Tasks</a>
        <a routerLink="/my-tasks" routerLinkActive="nav-link-active">My Tasks</a>
        <a routerLink="/members" routerLinkActive="nav-link-active">Community</a>
        <a routerLink="/groups" routerLinkActive="nav-link-active">Groups</a>
        <a routerLink="/messages" routerLinkActive="nav-link-active">Messages</a>
      </nav>
    }

    <div class="nav-right ml-auto flex items-center gap-3">
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="nav-user flex cursor-pointer items-center gap-2 rounded-full py-1 pe-4 ps-1">
            <img [src]="user.imageUrl || '/user.png'" alt="user avatar" class="size-8 rounded-full object-cover" />
            <span class="font-semibold">{{ user.displayName }}</span>
          </div>
          <ul tabindex="0" class="dropdown-content menu civic-card mt-3 w-56 rounded-3xl p-3 shadow-sm">
            <li><a [routerLink]="['/members', user.id]">My Profile</a></li>
            <li><a routerLink="/my-tasks">My Tasks</a></li>
            <li><a routerLink="/groups">Groups</a></li>
            <li><a (click)="logout()">Logout</a></li>
          </ul>
        </div>
      } @else {
        <form #loginForm="ngForm" (ngSubmit)="login()" class="nav-login flex items-center gap-2">
          <input [(ngModel)]="creds.email" name="email" type="text" class="input nav-input" placeholder="Email" />
          <input
            [(ngModel)]="creds.password"
            name="password"
            type="password"
            class="input nav-input"
            placeholder="Password"
          />
          <button type="submit" class="btn btn-primary nav-button">Login</button>
        </form>
      }
    </div>
  </div>
</header>
