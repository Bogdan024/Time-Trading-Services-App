<div class="register-shell civic-card mx-auto flex w-full max-w-2xl flex-col rounded-[2rem] p-3 shadow-lg">
  <div class="register-frame grid gap-8 rounded-[1.6rem] bg-white/60 p-5 md:grid-cols-[0.8fr_1.2fr] md:p-8">
    <section class="register-aside">
      <h2 class="civic-display mt-5 text-4xl font-semibold text-slate-800">Register</h2>
    </section>

    <section class="register-form-panel">
      <div class="card-title justify-center text-3xl text-slate-800">Create account</div>
      <div class="card-body w-full px-0">
        <form #registerForm="ngForm" class="flex w-full flex-col gap-4" (ngSubmit)="register()">
          <input class="input register-input w-full" name="email" [(ngModel)]="creds.email" placeholder="Email" />
          <input
            class="input register-input w-full"
            name="displayName"
            [(ngModel)]="creds.displayName"
            placeholder="Display name"
          />
          <input
            type="password"
            class="input register-input w-full"
            name="password"
            [(ngModel)]="creds.password"
            placeholder="Password"
          />

          <div class="mt-2 flex items-center justify-end gap-3">
            <button (click)="cancel()" type="button" class="btn register-cancel">Cancel</button>
            <button class="btn register-submit" type="submit">Register</button>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>
