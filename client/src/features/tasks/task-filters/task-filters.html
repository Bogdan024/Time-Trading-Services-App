<form class="civic-card rounded-[2rem] p-5" (submit)="$event.preventDefault(); apply()">
  <div class="flex flex-col gap-2 md:flex-row md:items-end md:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-[var(--civic-teal)]">Find the right exchange</p>
      <h2 class="civic-display text-2xl font-semibold text-slate-800">Filter open tasks</h2>
    </div>

    <div class="flex gap-2">
      <button type="button" class="btn rounded-full tt-surface-2" (click)="resetFilters.emit()">Reset</button>
      <button type="submit" class="btn btn-accent rounded-full">Apply filters</button>
    </div>
  </div>

  <div class="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
    <label class="form-control">
      <span class="label-text text-slate-600">Category</span>
      <select class="select rounded-2xl tt-surface-2" [value]="taskParams().serviceCategoryId ?? ''" (change)="setNumberFilter('serviceCategoryId', $event.target)">
        <option value="">Any category</option>
        @for (category of categories(); track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text text-slate-600">Location mode</span>
      <select class="select rounded-2xl tt-surface-2" [value]="taskParams().locationMode ?? ''" (change)="setLocationMode($event.target)">
        <option value="">Any mode</option>
        @for (mode of locationModes; track mode.value) {
          <option [value]="mode.value">{{ mode.label }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text text-slate-600">City</span>
      <input class="input rounded-2xl tt-surface-2" type="text" placeholder="Any city" [value]="taskParams().city ?? ''" (input)="setTextFilter('city', $event.target)" />
    </label>

    <label class="form-control">
      <span class="label-text text-slate-600">Country code</span>
      <input class="input rounded-2xl tt-surface-2 uppercase" type="text" maxlength="2" placeholder="Any country" [value]="taskParams().countryCode ?? ''" (input)="setTextFilter('countryCode', $event.target)" />
    </label>
  </div>

  <div class="mt-3 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
    <label class="form-control">
      <span class="label-text text-slate-600">Minimum credits</span>
      <select class="select rounded-2xl tt-surface-2" [value]="taskParams().minCredits ?? ''" (change)="setNumberFilter('minCredits', $event.target)">
        <option value="">No minimum</option>
        @for (credit of creditOptions; track credit) {
          <option [value]="credit">{{ credit }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text text-slate-600">Maximum credits</span>
      <select class="select rounded-2xl tt-surface-2" [value]="taskParams().maxCredits ?? ''" (change)="setNumberFilter('maxCredits', $event.target)">
        <option value="">No maximum</option>
        @for (credit of creditOptions; track credit) {
          <option [value]="credit">{{ credit }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text text-slate-600">Sort by</span>
      <select class="select rounded-2xl tt-surface-2" [value]="taskParams().orderBy" (change)="setOrderBy($event.target)">
        <option value="newest">Newest first</option>
        <option value="dueSoon">Due soon</option>
        <option value="credits">Most credits</option>
      </select>
    </label>

    <label class="form-control">
      <span class="label-text text-slate-600">Poster rating</span>
      <select class="select rounded-2xl tt-surface-2" [value]="taskParams().minPosterRating ?? ''" (change)="setNumberFilter('minPosterRating', $event.target)">
        <option value="">Any rating</option>
        @for (rating of [5, 4, 3, 2, 1]; track rating) {
          <option [value]="rating">{{ rating }}+ stars</option>
        }
      </select>
    </label>

    <label class="flex min-h-[4.5rem] items-center gap-3 rounded-2xl tt-surface-2 px-4 text-sm text-slate-700">
      <input class="checkbox checkbox-sm" type="checkbox" [checked]="taskParams().dueSoon" (change)="setDueSoon($event.target)" />
      Show tasks due in the next 7 days
    </label>
  </div>
</form>
