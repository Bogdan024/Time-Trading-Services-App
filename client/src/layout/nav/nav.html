<header class="nav-shell sticky top-0 z-50 w-full px-4 py-4 lg:px-8" [class.nav-shell-scrolled]="isScrolled()">
  <div class="nav-frame civic-card mx-auto flex max-w-7xl items-center gap-6 rounded-4xl px-5 py-4 lg:px-8">
    <a routerLink="/" routerLinkActive="text-accent" [routerLinkActiveOptions]="{ exact: true }" class="nav-brand flex items-center gap-4 pr-6">
      <div class="civic-ring nav-mark flex size-12 items-center justify-center rounded-full">
        <img src="/user.png" alt="Time Trading App logo" class="size-7 rounded-full object-cover" />
      </div>
      <div>
        <h3 class="civic-display text-2xl font-semibold text-slate-800">Time Trading</h3>
      </div>
    </a>

    <nav class="nav-links my-2 hidden gap-2 text-sm font-semibold uppercase tracking-[0.18em] md:flex">
      @if (accountService.currentUser()) {
        <a routerLink="/tasks" routerLinkActive="nav-link-active">Tasks</a>
        <a routerLink="/my-tasks" routerLinkActive="nav-link-active">My Tasks</a>
        <a routerLink="/groups" routerLinkActive="nav-link-active">Groups</a>
        <a routerLink="/messages" routerLinkActive="nav-link-active">Messages</a>
        <a routerLink="/errors" routerLinkActive="text-accent">Errors</a>
      }
    </nav>

    <div class="nav-right ml-auto flex items-center gap-3">
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="nav-user civic-badge flex cursor-pointer items-center gap-3 rounded-full px-3 py-2 text-base font-semibold"
          >
            <img src="/user.png" alt="user avatar" class="h-8 w-8 rounded-full" />
            <span>{{ user.displayName }}</span>
          </div>
          <ul tabindex="0" class="dropdown-content menu civic-card mt-3 w-56 rounded-3xl p-3 shadow-sm">
            <li><a routerLink="/my-tasks">My Tasks</a></li>
            <li><a routerLink="/groups">Groups</a></li>
            <li><a (click)="logout()">Logout</a></li>
          </ul>
        </div>
      } @else {
        <form #loginForm="ngForm" (ngSubmit)="login()" class="nav-login flex items-center gap-3">
          <input [(ngModel)]="creds.email" name="email" type="text" class="input nav-input" placeholder="Email" />
          <input
            [(ngModel)]="creds.password"
            name="password"
            type="password"
            class="input nav-input"
            placeholder="Password"
          />
          <button type="submit" class="btn nav-button">Login</button>
        </form>
      }
    </div>
  </div>
</header>
