@if (member(); as member) {
  <article
    class="tt-card-link civic-card h-full cursor-pointer gap-5 rounded-[1.1rem] p-5"
    [routerLink]="['/members', member.id]"
  >
    <div class="flex items-start gap-4">
      <img
        [src]="member.avatarUrl || '/user.png'"
        [alt]="member.displayName + ' avatar'"
        class="h-16 w-16 rounded-full object-cover"
      />
      <div class="min-w-0">
        <h2 class="civic-display text-xl font-semibold text-[var(--hearth-ink)]">{{ member.displayName }}</h2>
        <p class="text-sm text-hearth-muted">{{ member.city || 'Local' }}{{ member.countryCode ? ', ' + member.countryCode : '' }}</p>
      </div>
    </div>

    <p class="line-clamp-2 text-sm text-hearth-muted">{{ member.about || 'Community member' }}</p>

    <div class="mt-auto flex flex-wrap gap-2">
      @for (category of categories(member); track category) {
        <span class="tt-pill">{{ category }}</span>
      }
    </div>
  </article>
}
