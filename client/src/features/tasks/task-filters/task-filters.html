<form class="civic-card rounded-[1.1rem] p-6" (submit)="$event.preventDefault(); apply()">
  <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
    <div>
      <p class="tt-eyebrow">Find the right exchange</p>
      <h2 class="civic-display mt-1 text-xl font-semibold text-[var(--hearth-ink)]">Filter open tasks</h2>
    </div>

    <div class="flex gap-2">
      <button type="button" class="btn btn-ghost rounded-full border border-[var(--hearth-line)]" (click)="resetFilters.emit()">
        Reset filters
      </button>
      <button type="submit" class="btn btn-primary rounded-full">Apply filters</button>
    </div>
  </div>

  <div class="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Category</span>
      <select class="select tt-surface-2 w-full rounded-xl" [value]="taskParams().serviceCategoryId ?? ''" (change)="setNumberFilter('serviceCategoryId', $event.target)">
        <option value="">Any category</option>
        @for (category of categories(); track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Location mode</span>
      <select class="select tt-surface-2 w-full rounded-xl" [value]="taskParams().locationMode ?? ''" (change)="setLocationMode($event.target)">
        <option value="">Any mode</option>
        @for (mode of locationModes; track mode.value) {
          <option [value]="mode.value">{{ mode.label }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">City</span>
      <input class="input tt-surface-2 w-full rounded-xl" type="text" placeholder="Any city" [value]="taskParams().city ?? ''" (input)="setTextFilter('city', $event.target)" />
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Country code</span>
      <input class="input tt-surface-2 w-full rounded-xl uppercase" type="text" maxlength="2" placeholder="Any country" [value]="taskParams().countryCode ?? ''" (input)="setTextFilter('countryCode', $event.target)" />
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Minimum credits</span>
      <select class="select tt-surface-2 w-full rounded-xl" [value]="taskParams().minCredits ?? ''" (change)="setNumberFilter('minCredits', $event.target)">
        <option value="">No minimum</option>
        @for (credit of creditOptions; track credit) {
          <option [value]="credit">{{ credit }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Maximum credits</span>
      <select class="select tt-surface-2 w-full rounded-xl" [value]="taskParams().maxCredits ?? ''" (change)="setNumberFilter('maxCredits', $event.target)">
        <option value="">No maximum</option>
        @for (credit of creditOptions; track credit) {
          <option [value]="credit">{{ credit }}</option>
        }
      </select>
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Sort by</span>
      <select class="select tt-surface-2 w-full rounded-xl" [value]="taskParams().orderBy" (change)="setOrderBy($event.target)">
        <option value="newest">Newest first</option>
        <option value="dueSoon">Due soon</option>
        <option value="credits">Most credits</option>
      </select>
    </label>

    <label class="form-control">
      <span class="label-text mb-1.5 block text-xs font-semibold text-hearth-muted">Poster rating</span>
      <select class="select tt-surface-2 w-full rounded-xl" [value]="taskParams().minPosterRating ?? ''" (change)="setNumberFilter('minPosterRating', $event.target)">
        <option value="">Any rating</option>
        @for (rating of [5, 4, 3, 2, 1]; track rating) {
          <option [value]="rating">{{ rating }}+ stars</option>
        }
      </select>
    </label>
  </div>

  <label class="mt-4 inline-flex cursor-pointer items-center gap-3 text-sm text-[var(--hearth-ink)]">
    <input class="checkbox checkbox-sm checkbox-primary" type="checkbox" [checked]="taskParams().dueSoon" (change)="setDueSoon($event.target)" />
    Show only tasks due in the next 7 days
  </label>
</form>
