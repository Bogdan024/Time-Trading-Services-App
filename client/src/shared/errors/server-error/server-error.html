<section class="mx-auto max-w-3xl px-4 py-16">
  <div class="civic-card rounded-4xl p-8 text-center">
    <p class="text-sm font-semibold uppercase tracking-[0.35em] text-[var(--civic-teal)]">
      {{ error.statusCode }}
    </p>
    <h1 class="civic-display mt-3 text-4xl font-semibold text-slate-800">
      {{ error.message }}
    </h1>
    <button class="btn mt-6 rounded-full bg-[var(--civic-teal)] px-8 text-white" (click)="detailsToggle()">
      Details
    </button>

    @if (showDetails) {
      <pre class="mt-6 max-h-80 overflow-auto whitespace-pre-wrap rounded-3xl bg-slate-900 p-5 text-left text-sm text-slate-100">{{ error.details }}</pre>
    }
  </div>
</section>
