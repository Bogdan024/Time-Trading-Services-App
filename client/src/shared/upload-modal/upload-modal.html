<div
  class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/45 px-4 py-8 backdrop-blur-sm"
  role="dialog"
  aria-modal="true"
  aria-labelledby="upload-modal-title"
  (click)="close()"
>
  <div
    class="w-full max-w-3xl rounded-[2rem] border border-white/60 bg-[var(--civic-cream)] p-5 shadow-2xl shadow-slate-950/20 md:p-7"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-start justify-between gap-4">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.25em] text-[var(--civic-teal)]">{{ eyebrow() }}</p>
        <h2 id="upload-modal-title" class="civic-display mt-1 text-3xl font-semibold text-slate-800">{{ title() }}</h2>
        @if (description()) {
          <p class="mt-2 text-sm text-slate-600">{{ description() }}</p>
        }
      </div>

      <button type="button" class="btn btn-sm rounded-full bg-white/80" [disabled]="loading()" (click)="close()">Close</button>
    </div>

    <div class="mt-6">
      <app-image-upload [loading]="loading()" (uploadFile)="onUploadFile($event)" />
    </div>
  </div>
</div>
